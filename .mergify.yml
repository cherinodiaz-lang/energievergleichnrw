queue_rules:
  - name: default
    conditions:
      - check-success=build / typecheck
      - check-success=Lighthouse CI / Lighthouse
      - check-success=PR Validation / seo-validation
      - check-success=Browser Smoke / smoke-test

pull_request_rules:
  # Auto-merge Copilot / bot fix PRs to main after all required checks pass
  - name: Auto-merge Copilot fixes to main
    conditions:
      - base=main
      - label=automerge: true
      - -draft
      - -conflict
      - check-success=build / typecheck
      - check-success=Lighthouse CI / Lighthouse
      - check-success=PR Validation / seo-validation
      - check-success=Browser Smoke / smoke-test
    actions:
      merge:
        method: squash
        commit_message_template: |
          {{ title }} (#{{ number }})

          {{ body }}

  # Auto-merge Copilot / bot fix PRs to develop after CI passes
  - name: Auto-merge Copilot fixes to develop
    conditions:
      - base=develop
      - label=automerge: true
      - -draft
      - -conflict
      - check-success=build / typecheck
    actions:
      merge:
        method: squash
        commit_message_template: |
          {{ title }} (#{{ number }})

          {{ body }}

  # Auto-merge Dependabot patch/minor updates after CI passes
  - name: Auto-merge Dependabot patch and minor updates
    conditions:
      - author=dependabot[bot]
      - check-success=build / typecheck
      - check-success=PR Validation / seo-validation
      - check-success=Browser Smoke / smoke-test
      - label!=do-not-merge
      - title~=^chore\(deps
      - -title~=bump.*from [0-9]+\.[0-9]+.*to [0-9]+\.
    actions:
      review:
        type: APPROVE
        message: "Auto-approved: Dependabot patch/minor update ✅"
      merge:
        method: squash
        commit_message_template: |
          {{ title }} (#{{ number }})

  # Auto-merge GitHub Actions updates
  - name: Auto-merge Dependabot GitHub Actions updates
    conditions:
      - author=dependabot[bot]
      - check-success=build / typecheck
      - title~=^chore\(actions
    actions:
      review:
        type: APPROVE
        message: "Auto-approved: GitHub Actions update ✅"
      merge:
        method: squash

  # Block major version bumps — require manual review
  - name: Label major updates for manual review
    conditions:
      - author=dependabot[bot]
      - title~=bump.*from [0-9]+\.[0-9]+.*to [0-9]+\.
    actions:
      label:
        add:
          - needs-manual-review
      comment:
        message: "⚠️ Major version bump detected — bitte manuell prüfen!"
