queue_rules:
  - name: default
    conditions:
      - check-success=build
      - check-success=typecheck
      - check-success=validate-seo
      - check-success=Lighthouse CI / Lighthouse

pull_request_rules:
  # Auto-merge Dependabot patch/minor updates
  - name: Auto-merge Dependabot patch/minor
    conditions:
      - author=dependabot[bot]
      - check-success=build
      - check-success=typecheck
      - check-success=validate-seo
      - check-success=Lighthouse CI / Lighthouse
      - label!=dependencies-major
      - label!=do-not-merge
    actions:
      review:
        type: APPROVE
        message: "Auto-approved: Dependabot patch/minor update ✅"
      merge:
        method: squash

  # Auto-merge Copilot PRs
  - name: Auto-merge Copilot PRs
    conditions:
      - author=Copilot
      - check-success=build
      - check-success=typecheck
      - check-success=validate-seo
      - check-success=Lighthouse CI / Lighthouse
      - -draft
      - -conflict
    actions:
      merge:
        method: squash

  # Auto-merge PRs with automerge label to main
  - name: Auto-merge labeled PRs to main
    conditions:
      - base=main
      - label=automerge: true
      - -draft
      - -conflict
      - check-success=build
      - check-success=typecheck
      - check-success=validate-seo
      - check-success=Lighthouse CI / Lighthouse
    actions:
      merge:
        method: squash

  # Auto-merge labeled PRs to develop
  - name: Auto-merge labeled PRs to develop
    conditions:
      - base=develop
      - label=automerge: true
      - -draft
      - -conflict
      - check-success=build
      - check-success=typecheck
    actions:
      merge:
        method: squash

  # Block major version bumps — require manual review
  - name: Label major updates for manual review
    conditions:
      - author=dependabot[bot]
      - title~=bump.*from [0-9]+\.[0-9]+.*to [0-9]+\.
    actions:
      label:
        add:
          - needs-manual-review
      comment:
        message: "⚠️ Major version bump detected — bitte manuell prüfen!"
