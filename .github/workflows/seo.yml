name: validate-seo

on:
  pull_request:

concurrency:
  group: validate-seo-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-seo:
    name: validate-seo
    runs-on: ubuntu-latest
    env:
      ASTRO_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run SEO validation
        run: npm run validate:seo
