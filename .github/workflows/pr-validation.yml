name: PR Validation

on:
  pull_request:

jobs:
  seo-validation:
    name: SEO Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run SEO validation
        run: npm run validate:seo
