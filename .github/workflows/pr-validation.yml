name: PR Validation

on:
  pull_request:

jobs:
  seo-validation:
    name: SEO Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run SEO validation
        run: npm run validate:seo

      - name: Run tests
        run: npm run test

      - name: Run production build
        run: npm run build
