name: Codex Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout pull request
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Ensure OPENAI_API_KEY exists
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "Missing OPENAI_API_KEY secret"
            exit 1
          fi

      - name: Fetch base branch
        run: git fetch origin "${{ github.base_ref }}":"refs/remotes/origin/${{ github.base_ref }}"

      - name: Run Codex review
        run: |
          codex review \
            --base "origin/${{ github.base_ref }}" \
            "Review this pull request and report bugs, performance issues, and concrete improvements. Return concise markdown with sections: Bugs, Performance Issues, Improvements." \
            > codex-review.md

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- codex-review-bot -->';
            const path = 'codex-review.md';
            let body = fs.existsSync(path) ? fs.readFileSync(path, 'utf8').trim() : '';
            if (!body) {
              body = 'No findings reported by Codex.';
            }
            const maxLen = 65000;
            if (body.length > maxLen) {
              body = `${body.slice(0, maxLen)}\n\n...truncated...`;
            }
            const finalBody = `${marker}\n## Codex Review\n\n${body}`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) => comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: finalBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: finalBody,
              });
            }
