name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    env:
      WIX_CLIENT_ID: ${{ secrets.WIX_CLIENT_ID || 'ci-placeholder-00000000-0000-0000-0000-000000000000' }}
      WIX_CLIENT_SECRET: ${{ secrets.WIX_CLIENT_SECRET || 'ci-placeholder-secret' }}
      WIX_CLIENT_INSTANCE_ID: ${{ secrets.WIX_CLIENT_INSTANCE_ID || 'ci-placeholder-instance-id' }}
      WIX_CLIENT_PUBLIC_KEY: ${{ secrets.WIX_CLIENT_PUBLIC_KEY || 'ci-placeholder-public-key' }}
      ASTRO_TELEMETRY_DISABLED: "1"
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Wix CLI and add to PATH
        run: |
          npm install -g @wix/cli
          echo "$(npm prefix -g)/bin" >> $GITHUB_PATH
      - run: npm run build

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      WIX_CLIENT_ID: ${{ secrets.WIX_CLIENT_ID || 'ci-placeholder-00000000-0000-0000-0000-000000000000' }}
      WIX_CLIENT_SECRET: ${{ secrets.WIX_CLIENT_SECRET || 'ci-placeholder-secret' }}
      WIX_CLIENT_INSTANCE_ID: ${{ secrets.WIX_CLIENT_INSTANCE_ID || 'ci-placeholder-instance-id' }}
      WIX_CLIENT_PUBLIC_KEY: ${{ secrets.WIX_CLIENT_PUBLIC_KEY || 'ci-placeholder-public-key' }}
      ASTRO_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check

  validate-seo:
    name: validate-seo
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run validate:seo

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Only deploy on push to main — never on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build, typecheck, validate-seo]
    env:
      ASTRO_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Wix CLI
        run: |
          npm install -g @wix/cli
          echo "$(npm prefix -g)/bin" >> $GITHUB_PATH

      - name: Restore Wix auth credentials
        run: |
          mkdir -p ~/.wix/auth
          echo '${{ secrets.WIX_AUTH_ACCOUNT }}' > ~/.wix/auth/account.json
          echo '${{ secrets.WIX_AUTH_SITE }}' > ~/.wix/auth/52dd1482-1ebb-4472-90a2-bce2af5d763f.json

      - name: Build
        run: wix build
        env:
          WIX_CLIENT_ID: ${{ secrets.WIX_CLIENT_ID || 'ci-placeholder-00000000-0000-0000-0000-000000000000' }}
          WIX_CLIENT_SECRET: ${{ secrets.WIX_CLIENT_SECRET || 'ci-placeholder-secret' }}
          WIX_CLIENT_INSTANCE_ID: ${{ secrets.WIX_CLIENT_INSTANCE_ID || 'ci-placeholder-instance-id' }}
          WIX_CLIENT_PUBLIC_KEY: ${{ secrets.WIX_CLIENT_PUBLIC_KEY || 'ci-placeholder-public-key' }}

      - name: Release to Wix Headless
        run: wix release --comment "CI auto-deploy from ${{ github.sha }}"
