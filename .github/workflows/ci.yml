name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Check / Typecheck / Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      # If your install pulls private packages, set repository secret NPM_TOKEN.
      # setup-node will use NODE_AUTH_TOKEN for npm auth.
      - name: Install
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # NOTE: We intentionally do NOT run `wix build` in CI by default,
      # because it can require Wix auth/environment that isn't available on PRs.
      - name: Run quality gates (auto-detect)
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const cp = require('child_process');

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const scripts = pkg.scripts || {};

          // Prefer a single aggregated script if present
          if (scripts['check:all']) {
            console.log('Running: npm run -s check:all');
            cp.execSync('npm run -s check:all', { stdio: 'inherit' });
          } else {
            const steps = [];
            if (scripts.check) steps.push('npm run -s check');
            if (scripts.typecheck) steps.push('npm run -s typecheck');
            if (!steps.length) console.log('No check/typecheck scripts found; skipping.');
            if (steps.length) {
              const cmd = steps.join(' && ');
              console.log('Running:', cmd);
              cp.execSync(cmd, { stdio: 'inherit' });
            }
          }

          // Optional tests
          if (scripts['test:run']) {
            console.log('Running: npm run -s test:run');
            cp.execSync('npm run -s test:run', { stdio: 'inherit' });
          } else if (scripts.test) {
            console.log('Running: npm run -s test');
            cp.execSync('npm run -s test', { stdio: 'inherit' });
          }
          NODE
