name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    env:
      WIX_CLIENT_ID: ${{ secrets.WIX_CLIENT_ID }}
      WIX_CLIENT_SECRET: ${{ secrets.WIX_CLIENT_SECRET }}
      WIX_CLIENT_INSTANCE_ID: ${{ secrets.WIX_CLIENT_INSTANCE_ID }}
      WIX_CLIENT_PUBLIC_KEY: ${{ secrets.WIX_CLIENT_PUBLIC_KEY }}
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Bootstrap Wix env (fallback from wix.config.json)
        run: |
          if [ -z "$WIX_CLIENT_ID" ]; then
            APP_ID=$(node -e "console.log(require('./wix.config.json').appId)")
            echo "WIX_CLIENT_ID=$APP_ID" >> $GITHUB_ENV
          fi
          if [ -z "$WIX_CLIENT_INSTANCE_ID" ]; then
            echo "WIX_CLIENT_INSTANCE_ID=local-preview-instance-id" >> $GITHUB_ENV
          fi
          if [ -z "$WIX_CLIENT_PUBLIC_KEY" ]; then
            echo "WIX_CLIENT_PUBLIC_KEY=local-preview-public-key" >> $GITHUB_ENV
          fi
          if [ -z "$WIX_CLIENT_SECRET" ]; then
            echo "WIX_CLIENT_SECRET=local-preview-secret" >> $GITHUB_ENV
          fi

      - name: Type and config checks
        run: npm run check

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build
