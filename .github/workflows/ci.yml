name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    env:
      WIX_CLIENT_ID: ${{ secrets.WIX_CLIENT_ID }}
      WIX_CLIENT_SECRET: ${{ secrets.WIX_CLIENT_SECRET }}
      WIX_CLIENT_INSTANCE_ID: ${{ secrets.WIX_CLIENT_INSTANCE_ID }}
      WIX_CLIENT_PUBLIC_KEY: ${{ secrets.WIX_CLIENT_PUBLIC_KEY }}
      ASTRO_TELEMETRY_DISABLED: "1"
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Type and config checks
        run: npm run check

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build
