name: Lighthouse CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: lighthouse-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  ASTRO_TELEMETRY_DISABLED: "1"
  CI: true

jobs:
  lighthouse-audit:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT_FRONTEND: ${{ secrets.SENTRY_PROJECT_FRONTEND }}
      SENTRY_PROJECT_SERVER: ${{ secrets.SENTRY_PROJECT_SERVER }}
      PUBLIC_SENTRY_DSN: ${{ secrets.PUBLIC_SENTRY_DSN }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      WIX_CLIENT_ID: ${{ secrets.WIX_CLIENT_ID }}
      WIX_CLIENT_SECRET: ${{ secrets.WIX_CLIENT_SECRET }}
      WIX_CLIENT_PUBLIC_KEY: ${{ secrets.WIX_CLIENT_PUBLIC_KEY }}
      WIX_CLIENT_INSTANCE_ID: ${{ secrets.WIX_CLIENT_INSTANCE_ID }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - id: chrome
        uses: browser-actions/setup-chrome@v1
      - name: Install dependencies
        run: npm ci
      - name: Disable Astro telemetry
        run: npx astro telemetry disable || true
      - name: Build preview bundle
        run: npm run build
      - name: Start preview worker
        run: |
          npm run preview:worker > preview.log 2>&1 &
          echo $! > preview.pid
      - name: Wait for Lighthouse routes
        run: |
          urls=(
            "http://127.0.0.1:4321/"
            "http://127.0.0.1:4321/stromvergleich-nrw"
            "http://127.0.0.1:4321/gasvergleich-nrw"
          )
          for url in "${urls[@]}"; do
            ready=0
            for attempt in {1..30}; do
              status="$(curl -s -o /dev/null -w '%{http_code}' -A 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) HeadlessChrome/148.0.0.0 Safari/537.36' "$url" || true)"
              if [ "$status" = "200" ]; then
                ready=1
                break
              fi
              sleep 2
            done
            if [ "$ready" -ne 1 ]; then
              echo "Preview route failed readiness check: $url"
              cat preview.log
              exit 1
            fi
          done
      - name: Run browser visibility smoke
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: |
          set -o pipefail
          npx tsx scripts/smoke-browser.ts --base-url http://127.0.0.1:4321 | tee browser-smoke.log
      - name: Collect Lighthouse metrics
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: npx lhci collect --config=lighthouserc.json
      - name: Assert Lighthouse thresholds
        run: npx lhci assert --config=lighthouserc.json
      - name: Upload Lighthouse results
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        run: npx lhci upload --config=lighthouserc.json
      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            preview.log
            browser-smoke.log
            .lighthouseci/**
      - name: Stop preview worker
        if: always()
        run: |
          if [ -f preview.pid ]; then
            kill "$(cat preview.pid)" || true
          fi
      - name: Show preview log
        if: failure()
        run: cat preview.log
