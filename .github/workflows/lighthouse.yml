name: Lighthouse CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lighthouse:
    name: Lighthouse
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ASTRO_TELEMETRY_DISABLED: "1"
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT_FRONTEND: ${{ secrets.SENTRY_PROJECT_FRONTEND }}
      SENTRY_PROJECT_SERVER: ${{ secrets.SENTRY_PROJECT_SERVER }}
      PUBLIC_SENTRY_DSN: ${{ secrets.PUBLIC_SENTRY_DSN }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      # Fall back to a placeholder so the Astro env-plugin accepts the build
      # in forks/Dependabot contexts where the real secret is unavailable.
      WIX_CLIENT_ID: ${{ secrets.WIX_CLIENT_ID || 'ci-placeholder-00000000-0000-0000-0000-000000000000' }}
      WIX_CLIENT_SECRET: ${{ secrets.WIX_CLIENT_SECRET || 'ci-placeholder-secret' }}
      WIX_CLIENT_PUBLIC_KEY: ${{ secrets.WIX_CLIENT_PUBLIC_KEY || 'ci-placeholder-public-key' }}
      WIX_CLIENT_INSTANCE_ID: ${{ secrets.WIX_CLIENT_INSTANCE_ID || 'ci-placeholder-instance-id' }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - id: chrome
        uses: browser-actions/setup-chrome@v2
      - run: npm ci
      - name: Install Wix CLI and add to PATH
        run: |
          npm install -g @wix/cli
          echo "$(npm prefix -g)/bin" >> $GITHUB_PATH
      - run: npm run build
      - name: Start preview server
        run: |
          npm run preview:worker > wrangler-preview.log 2>&1 &
          echo $! > wrangler-preview.pid
      - name: Wait for preview server
        run: |
          # Wait up to 60 s for the server root to respond (follow redirects, accept any 2xx/3xx)
          for attempt in {1..30}; do
            status="$(curl -s -o /dev/null -w '%{http_code}' -L http://127.0.0.1:4321/ || true)"
            if [[ "$status" =~ ^[23] ]]; then
              echo "Preview server ready (HTTP $status)"
              break
            fi
            echo "Attempt $attempt: HTTP $status – retrying in 2 s..."
            sleep 2
          done
          # Final check: fail if the server is still not responding
          status="$(curl -s -o /dev/null -w '%{http_code}' -L http://127.0.0.1:4321/ || true)"
          if [[ ! "$status" =~ ^[23] ]]; then
            echo "Preview server did not become ready after 60 s (last HTTP $status)"
            cat wrangler-preview.log || true
            exit 1
          fi
      - run: npm run lhci:collect
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
      - name: Assert Lighthouse scores
        run: npm run lhci:assert
        continue-on-error: true
      - run: npx lhci upload --config=lighthouserc.json
        continue-on-error: true
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
      - name: Stop preview server
        if: always()
        run: |
          if [ -f wrangler-preview.pid ]; then
            kill "$(cat wrangler-preview.pid)" || true
          fi
      - name: Show preview server log
        if: failure()
        run: |
          if [ -f wrangler-preview.log ]; then
            cat wrangler-preview.log
          else
            echo "wrangler-preview.log not found"
          fi
