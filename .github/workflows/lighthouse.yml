name: Lighthouse CI

on:
  pull_request:
    branches: [main]

jobs:
  Lighthouse:
    name: Lighthouse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - run: npm run lhci:collect
      - run: npm run lhci:assert
