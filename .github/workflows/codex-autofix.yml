name: Codex AutoFix

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: codex-autofix
  cancel-in-progress: true

jobs:
  autofix:
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest

    env:
      ASTRO_TELEMETRY_DISABLED: "1"
      WIX_CLIENT_ID: ${{ secrets.WIX_CLIENT_ID }}
      WIX_CLIENT_SECRET: ${{ secrets.WIX_CLIENT_SECRET }}
      WIX_CLIENT_INSTANCE_ID: ${{ secrets.WIX_CLIENT_INSTANCE_ID }}
      WIX_CLIENT_PUBLIC_KEY: ${{ secrets.WIX_CLIENT_PUBLIC_KEY }}

    steps:
      - name: Checkout failed revision
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run Codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            The CI workflow failed on the current commit.
            Fix the root cause of the failure in this repository.

            Requirements:
            - Follow .github/copilot-instructions.md
            - Follow any matching files under .github/instructions/
            - Fix the actual failing issue, not unrelated code
            - Keep diffs minimal
            - Do not introduce breaking changes

            After making changes, run:
            - npm run check
            - npm run test:run
            - npm run build

            Only stop when those commands pass, or explain clearly in the output what still blocks success.
          sandbox: workspace-write
          codex-args: --full-auto

      - name: Commit and push fixes to recovery branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "codex-bot"
            git config user.email "codex-bot@users.noreply.github.com"
            BRANCH="recovery/codex-autofix-$(date +%Y%m%d-%H%M%S)"
            git checkout -b "$BRANCH"
            git add .
            git commit -m "auto-fix: codex resolved CI failure"
            git push origin "$BRANCH"
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "auto-fix: codex resolved CI failure" \
              --body "Automated fix proposed by Codex AutoFix workflow for a CI failure on main. Review and merge via this PR — do not push directly to main."
          else
            echo "No changes to commit"
          fi
