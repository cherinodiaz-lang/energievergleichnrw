name: Auto-Fix Issues Detection

on:
  workflow_run:
    workflows: ["build"]
    types: [completed]

permissions:
  issues: write
  actions: read
  contents: read

concurrency:
  group: auto-fix-issues
  cancel-in-progress: false

jobs:
  detect-and-create-issue:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'failure'

    steps:
      - name: Ensure labels exist
        uses: actions/github-script@v8
        with:
          script: |
            const labels = [
              { name: 'auto-fix', color: 'e11d48', description: 'Automatically detected issue requiring a fix' },
              { name: 'needs-human-review', color: 'b91c1c', description: 'Auto-fix failed 3 times – needs human intervention' },
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, ...label });
              } catch {
                // Label already exists – ignore
              }
            }

      - name: Count existing auto-fix attempts for this branch
        id: retry
        uses: actions/github-script@v8
        with:
          script: |
            const branch = "${{ github.event.workflow_run.head_branch }}";
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'auto-fix',
              state: 'open',
              per_page: 100,
            });
            const forBranch = issues.filter(i => i.title.includes(`\`${branch}\``));
            core.setOutput('count', String(forBranch.length));
            core.setOutput('branch', branch);
            console.log(`Existing auto-fix issues for branch '${branch}': ${forBranch.length}`);

      - name: Get failed step details
        id: details
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ github.event.workflow_run.id }}"

          FAILED_STEPS=$(gh api \
            "repos/${{ github.repository }}/actions/runs/$RUN_ID/jobs" \
            --jq '[.jobs[] | select(.conclusion == "failure") | {
              job: .name,
              steps: [.steps[] | select(.conclusion == "failure") | .name]
            }]' 2>/dev/null || echo "[]")

          echo "failed_steps=$FAILED_STEPS" >> "$GITHUB_OUTPUT"
          echo "run_url=${{ github.event.workflow_run.html_url }}" >> "$GITHUB_OUTPUT"
          echo "branch=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
          SHA="${{ github.event.workflow_run.head_sha }}"
          echo "sha=${SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Escalate to human review after 3 failed attempts
        if: steps.retry.outputs.count >= '3'
        uses: actions/github-script@v8
        with:
          script: |
            const branch = "${{ steps.details.outputs.branch }}";
            const sha    = "${{ steps.details.outputs.sha }}";
            const runUrl = "${{ steps.details.outputs.run_url }}";

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Auto-Fix fehlgeschlagen nach 3 Versuchen – \`${branch}\` (${sha})`,
              body: [
                "## 🚨 Manueller Eingriff erforderlich",
                "",
                `Der automatische Fix-Workflow hat für Branch \`${branch}\` dreimal versagt.`,
                "Auto-Fix wurde gestoppt um Endlosschleifen zu verhindern.",
                "",
                `| Field | Value |`,
                `|-------|-------|`,
                `| **Branch** | \`${branch}\` |`,
                `| **Commit** | \`${sha}\` |`,
                `| **Workflow Run** | [View logs](${runUrl}) |`,
                "",
                "## Aufgaben",
                "- [ ] Root cause manuell analysieren",
                "- [ ] Fix implementieren",
                "- [ ] Alle open `auto-fix` Issues für diesen Branch schließen",
              ].join("\n"),
              labels: ['needs-human-review'],
            });
            console.log(`Escalation issue #${issue.data.number} created: ${issue.data.html_url}`);

      - name: Create auto-fix issue for Copilot
        if: steps.retry.outputs.count < '3'
        uses: actions/github-script@v8
        with:
          script: |
            const runUrl    = "${{ steps.details.outputs.run_url }}";
            const branch    = "${{ steps.details.outputs.branch }}";
            const sha       = "${{ github.event.workflow_run.head_sha }}".slice(0, 7);
            const attempt   = Number("${{ steps.retry.outputs.count }}") + 1;
            const rawSteps  = `${{ steps.details.outputs.failed_steps }}`;

            let failureSection = "";
            try {
              const jobs = JSON.parse(rawSteps);
              if (jobs.length > 0) {
                failureSection = jobs.map(j => {
                  const steps = j.steps.length > 0
                    ? j.steps.map(s => `  - ${s}`).join("\n")
                    : "  *(no individual step details)*";
                  return `**Job: ${j.job}**\n${steps}`;
                }).join("\n\n");
              }
            } catch {
              failureSection = "*(could not parse step details)*";
            }

            const body = [
              "## 🔴 CI Failure Detected",
              "",
              `| Field | Value |`,
              `|-------|-------|`,
              `| **Branch** | \`${branch}\` |`,
              `| **Commit** | \`${sha}\` |`,
              `| **Attempt** | ${attempt} / 3 |`,
              `| **Workflow Run** | [View logs](${runUrl}) |`,
              "",
              "## Failed Steps",
              "",
              failureSection || "*(check the workflow run link above for details)*",
              "",
              "## Task for Copilot",
              "",
              "Please:",
              "1. Analyze the failing workflow run linked above",
              "2. Identify the root cause (type errors, test failures, build errors, ESLint issues)",
              "3. Fix the issue with **minimal, focused changes**",
              "4. Create a PR targeting the `develop` branch",
              "5. Label the PR with `automerge: true`",
              "",
              "> ⚠️ After 3 failed attempts this issue will be escalated to `needs-human-review`.",
              "",
              "### Definition of Done",
              "- [ ] Root cause identified",
              "- [ ] Fix implemented",
              "- [ ] `npm run check` passes",
              "- [ ] `npm run test:run` passes",
              "- [ ] `npm run build` passes",
              "- [ ] PR created with label `automerge: true`",
            ].join("\n");

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🤖 Auto-Fix: CI failure on \`${branch}\` (${sha}) – attempt ${attempt}/3`,
              body,
              labels: ['auto-fix', 'type:bug'],
              assignees: ['copilot'],
            });

            console.log(`Issue #${issue.data.number} created: ${issue.data.html_url}`);
