name: Auto-Fix Issues with Copilot

on:
  workflow_run:
    workflows: ["CI", "PR Validation", "Browser Smoke"]
    types: [completed]
  schedule:
    - cron: "0 * * * *"

permissions:
  issues: write

jobs:
  detect-and-create-issue:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'failure' &&
       github.event.workflow_run.head_branch == 'main') ||
      github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Analyze failed workflow
        id: analyze
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FAILURES=$(gh run list -L 5 --branch main --json conclusion,name,url \
            --jq '[.[] | select(.conclusion=="failure")] | map(.name + " (" + .url + ")") | join(", ")')
          echo "failures=$FAILURES" >> $GITHUB_OUTPUT

      - name: Create issue for Copilot
        if: steps.analyze.outputs.failures != ''
        uses: actions/github-script@v7
        with:
          script: |
            const failures = `${{ steps.analyze.outputs.failures }}`;
            const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🤖 Auto-Fix: ${failures.split(',')[0].split('(')[0].trim()}`,
                body: [
                  `## Workflow Failure Detected`,
                  ``,
                  `The following workflows failed: **${failures}**`,
                  ``,
                  `Copilot, please:`,
                  `1. Identify the root cause of the failure`,
                  `2. Fix the issue following \`.github/copilot-instructions.md\``,
                  `3. Create a PR with the fix`,
                  ``,
                  `> This issue was automatically created by the Auto-Fix Issues workflow.`,
                ].join('\n'),
                labels: ['bug', 'auto-fix'],
                assignees: ['copilot'],
              });
              console.log(`Issue created: #${issue.data.number}`);
