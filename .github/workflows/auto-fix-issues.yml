name: Auto-Fix Issues Detection

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  issues: write
  actions: read
  contents: read

concurrency:
  group: auto-fix-issues
  cancel-in-progress: false

jobs:
  detect-and-create-issue:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'failure'

    steps:
      - name: Ensure auto-fix label exists
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'auto-fix',
                color: 'e11d48',
                description: 'Automatically detected issue requiring a fix',
              });
            } catch {
              // Label already exists – ignore
            }

      - name: Check for duplicate open auto-fix issue
        id: dedup
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'auto-fix',
              state: 'open',
              per_page: 5,
            });
            const hasDuplicate = issues.data.length > 0;
            core.setOutput('skip', hasDuplicate ? 'true' : 'false');
            if (hasDuplicate) {
              console.log(`Duplicate open issue found (#${issues.data[0].number}) – skipping creation.`);
            }

      - name: Get failed step details
        id: details
        if: steps.dedup.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ github.event.workflow_run.id }}"

          FAILED_STEPS=$(gh api \
            "repos/${{ github.repository }}/actions/runs/$RUN_ID/jobs" \
            --jq '[.jobs[] | select(.conclusion == "failure") | {
              job: .name,
              steps: [.steps[] | select(.conclusion == "failure") | .name]
            }]' 2>/dev/null || echo "[]")

          echo "failed_steps=$FAILED_STEPS" >> "$GITHUB_OUTPUT"
          echo "run_url=${{ github.event.workflow_run.html_url }}" >> "$GITHUB_OUTPUT"
          echo "branch=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
          SHA="${{ github.event.workflow_run.head_sha }}"
          echo "sha=${SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Create auto-fix issue for Copilot
        if: steps.dedup.outputs.skip == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl    = "${{ steps.details.outputs.run_url }}";
            const branch    = "${{ steps.details.outputs.branch }}";
            const sha       = "${{ github.event.workflow_run.head_sha }}".slice(0, 7);
            const rawSteps  = `${{ steps.details.outputs.failed_steps }}`;

            let failureSection = "";
            try {
              const jobs = JSON.parse(rawSteps);
              if (jobs.length > 0) {
                failureSection = jobs.map(j => {
                  const steps = j.steps.length > 0
                    ? j.steps.map(s => `  - ${s}`).join("\n")
                    : "  *(no individual step details)*";
                  return `**Job: ${j.job}**\n${steps}`;
                }).join("\n\n");
              }
            } catch {
              failureSection = "*(could not parse step details)*";
            }

            const body = [
              "## 🔴 CI Failure Detected",
              "",
              `| Field | Value |`,
              `|-------|-------|`,
              `| **Branch** | \`${branch}\` |`,
              `| **Commit** | \`${sha}\` |`,
              `| **Workflow Run** | [View logs](${runUrl}) |`,
              "",
              "## Failed Steps",
              "",
              failureSection || "*(check the workflow run link above for details)*",
              "",
              "## Task for Copilot",
              "",
              "Please:",
              "1. Analyze the failing workflow run linked above",
              "2. Identify the root cause (type errors, test failures, build errors, ESLint issues)",
              "3. Fix the issue with **minimal, focused changes**",
              "4. Create a PR targeting the `develop` branch",
              "5. Label the PR with `automerge: true`",
              "",
              "### Definition of Done",
              "- [ ] Root cause identified",
              "- [ ] Fix implemented",
              "- [ ] `npm run check` passes",
              "- [ ] `npm run test:run` passes",
              "- [ ] `npm run build` passes",
              "- [ ] PR created with label `automerge: true`",
            ].join("\n");

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🤖 Auto-Fix: CI failure on \`${branch}\` (${sha})`,
              body,
              labels: ['auto-fix', 'type:bug'],
              assignees: ['copilot'],
            });

            console.log(`Issue #${issue.data.number} created: ${issue.data.html_url}`);
