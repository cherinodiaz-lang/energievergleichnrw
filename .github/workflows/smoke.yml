name: Browser Smoke

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to smoke-test (default: production)"
        required: false
        default: "https://www.energievergleich.shop"

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    name: smoke-test
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ASTRO_TELEMETRY_DISABLED: "1"
      SMOKE_BASE_URL: ${{ inputs.base_url || 'https://www.energievergleich.shop' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run browser smoke check
        run: npm run smoke:runtime
