name: Recovery

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Brief description of the incident being recovered"
        required: true
      sha:
        description: "Commit SHA to restore from (defaults to HEAD~1 if omitted)"
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  recover:
    name: Open Recovery PR
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ASTRO_TELEMETRY_DISABLED: "1"
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate inputs
        run: |
          if [ -z "${{ inputs.reason }}" ]; then
            echo "::error::Recovery reason is required."
            exit 1
          fi

      - name: Resolve target SHA
        id: resolve
        run: |
          if [ -n "${{ inputs.sha }}" ]; then
            TARGET_SHA="${{ inputs.sha }}"
          else
            TARGET_SHA="$(git rev-parse HEAD~1)"
          fi
          echo "sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"
          echo "Recovering to SHA: $TARGET_SHA"

      - name: Create recovery branch
        id: branch
        run: |
          BRANCH="recovery/$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH" "${{ steps.resolve.outputs.sha }}"
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "Recovery branch created: $BRANCH"

      - name: Open recovery pull request
        run: |
          gh pr create \
            --base main \
            --head "${{ steps.branch.outputs.branch }}" \
            --title "recovery: ${{ inputs.reason }}" \
            --body "$(printf '## Recovery PR\n\n**Reason:** %s\n**Target SHA:** %s\n\n> ⚠️ This PR was created by the Recovery workflow. Review and merge to restore main.\n> Never force-push or hard-reset main — use this PR instead.' \
              "${{ inputs.reason }}" "${{ steps.resolve.outputs.sha }}")"
