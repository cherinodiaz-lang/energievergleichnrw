name: Browser Smoke

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: browser-smoke-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  ASTRO_TELEMETRY_DISABLED: "1"
  CI: true

jobs:
  browser-smoke-validation:
    name: Browser Smoke Validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      WIX_CLIENT_ID: ${{ secrets.WIX_CLIENT_ID }}
      WIX_CLIENT_SECRET: ${{ secrets.WIX_CLIENT_SECRET }}
      WIX_CLIENT_INSTANCE_ID: ${{ secrets.WIX_CLIENT_INSTANCE_ID }}
      WIX_CLIENT_PUBLIC_KEY: ${{ secrets.WIX_CLIENT_PUBLIC_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Setup Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: npm ci

      - name: Disable Astro telemetry
        run: npx astro telemetry disable || true

      - name: Build preview bundle
        run: npm run build

      - name: Start preview worker
        run: |
          npm run preview:worker > preview.log 2>&1 &
          echo $! > preview.pid

      - name: Wait for critical routes
        run: |
          urls=(
            "http://127.0.0.1:4321/"
            "http://127.0.0.1:4321/stromvergleich-nrw"
            "http://127.0.0.1:4321/gasvergleich-nrw"
            "http://127.0.0.1:4321/photovoltaik-nrw"
            "http://127.0.0.1:4321/ratgeber"
          )
          for url in "${urls[@]}"; do
            ready=0
            for attempt in {1..30}; do
              status="$(curl -s -o /dev/null -w '%{http_code}' -A 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) HeadlessChrome/148.0.0.0 Safari/537.36' "$url" || true)"
              if [ "$status" = "200" ]; then
                ready=1
                break
              fi
              sleep 2
            done
            if [ "$ready" -ne 1 ]; then
              echo "Preview route failed readiness check: $url"
              cat preview.log
              exit 1
            fi
          done

      - name: Run runtime smoke
        run: |
          set -o pipefail
          npm run smoke:runtime -- --base-url http://127.0.0.1:4321 | tee runtime-smoke.log

      - name: Run browser smoke
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: |
          set -o pipefail
          npx tsx scripts/smoke-browser.ts --base-url http://127.0.0.1:4321 | tee browser-smoke.log

      - name: Upload smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-smoke-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            preview.log
            runtime-smoke.log
            browser-smoke.log

      - name: Stop preview worker
        if: always()
        run: |
          if [ -f preview.pid ]; then
            kill "$(cat preview.pid)" || true
          fi

      - name: Show preview log
        if: failure()
        run: cat preview.log
