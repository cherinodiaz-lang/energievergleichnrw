name: Auto-Merge PRs

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled]

permissions:
  pull-requests: write
  contents: write

concurrency:
  group: auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  auto-merge:
    name: auto-merge
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Check for blocking reviews
        id: reviews
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner, repo, pull_number, per_page: 100,
            });
            // Find the latest review state per reviewer
            const latest = {};
            for (const r of reviews) {
              if (r.state !== 'COMMENTED') latest[r.user.login] = r.state;
            }
            const blocked = Object.values(latest).some(s => s === 'CHANGES_REQUESTED');
            core.setOutput('blocked', blocked ? 'true' : 'false');
            console.log(`Review blocking: ${blocked}`);

      - name: Enable GitHub native auto-merge (squash)
        if: steps.reviews.outputs.blocked == 'false'
        uses: actions/github-script@v8
        with:
          script: |
            const prNodeId = context.payload.pull_request.node_id;
            const prNumber = context.payload.pull_request.number;
            try {
              await github.graphql(`
                mutation EnableAutoMerge($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: $pullRequestId,
                    mergeMethod: SQUASH
                  }) {
                    pullRequest { number }
                  }
                }
              `, { pullRequestId: prNodeId });
              console.log(`Auto-merge (squash) enabled on PR #${prNumber}.`);
            } catch (err) {
              core.warning(`Could not enable auto-merge: ${err.message}. Verify that "Allow auto-merge" is enabled in repository settings.`);
            }
