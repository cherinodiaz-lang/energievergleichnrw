name: Performance & SEO

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run daily at 2 AM
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build site
        run: npm run build
        
      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            https://energievergleichnrw.de
            https://energievergleichnrw.de/stromvergleich-nrw
            https://energievergleichnrw.de/gasvergleich-nrw
          uploadArtifacts: true
          temporaryPublicStorage: true

  seo-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build site
        run: npm run build
        
      - name: Validate sitemap
        run: |
          echo "🗺️ Checking sitemap..."
          test -f dist/sitemap-index.xml && echo "✅ Sitemap exists" || echo "❌ Sitemap missing!"
          
      - name: Check robots.txt
        run: |
          echo "🤖 Checking robots.txt..."
          test -f dist/robots.txt && echo "✅ Robots.txt exists" || echo "❌ Robots.txt missing!"
          
      - name: Validate HTML
        run: |
          echo "📝 Validating HTML structure..."
          npx html-validate "dist/**/*.html" || true

  broken-links:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Check broken links
        uses: ruzickap/action-my-broken-link-checker@v2
        with:
          url: https://energievergleichnrw.de
          pages_path: /
          cmd_params: '--buffer-size=8192 --max-connections=10 --rate-limit=10'

  image-optimization:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Check image sizes
        run: |
          echo "🖼️ Checking image sizes..."
          find public -type f \( -name '*.jpg' -o -name '*.jpeg' -o -name '*.png' -o -name '*.webp' \) -size +500k -exec ls -lh {} \; || true
          echo "✅ Image size check complete"
