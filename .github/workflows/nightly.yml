name: Nightly Codex Audit

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-codex-audit
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Ensure OPENAI_API_KEY exists
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "Missing OPENAI_API_KEY secret"
            exit 1
          fi

      - name: Run nightly Codex audit
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          codex exec \
            --full-auto \
            --sandbox read-only \
            --model gpt-5.3-codex \
            --cd . \
            -o nightly-audit.md \
            "Audit this repository for performance, SEO, and code quality. Provide prioritized findings (P0-P2), concrete fixes, and quick wins in markdown."

      - name: Add report to job summary
        run: cat nightly-audit.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload audit artifact
        uses: actions/upload-artifact@v4
        with:
          name: nightly-codex-audit
          path: nightly-audit.md
