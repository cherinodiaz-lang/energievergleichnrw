version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: energievergleichnrw
    ports:
      - "4321:4321"
    environment:
      - NODE_ENV=production
      - PORT=4321
      - PUBLIC_SITE_URL=https://energievergleichnrw.de
      # Weitere Env Vars hier hinzufügen
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4321/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - app-network
    volumes:
      # Optional: Logs persistieren
      - ./logs:/app/logs
    labels:
      - "com.energievergleichnrw.description=EnergieVergleich NRW Web Application"
      - "com.energievergleichnrw.version=2.0.0"

  # Optional: Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: energievergleichnrw-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  logs:
    driver: local
